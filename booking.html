<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book AC Service | CoolFix AC</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!--========== HEADER ==========-->

    <header>

        <div class="logo">
            <i class="fa-solid fa-snowflake"></i>
            <h2>CoolFix AC</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="booking.html">Booking</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

<!--========== BANNER ==========-->

    <main>
        
        <section class="page-banner">

            <h1>Book AC Service</h1>
                <p>Quick & Easy Online Booking</p>

        </section>

<!--========== BOOKING FORM ==========-->

        <section class="booking-section">

            <div class="booking-form">

                <h2>Schedule Your Service</h2>

                <form id="bookingForm">

                    <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required>

                    <input
                    type="tel"
                    id="phone"
                    placeholder="Mobile Number"
                    required>


                    <input
                    type="text"
                    id="address"
                    placeholder="Service Address"
                    required>


                    <label for="brand"></label>

                    <input
                    type="text"
                    id="brand"
                    name="brand"
                    list="brandList"
                    placeholder="Select or Enter AC Brand"
                    required>

                    <datalist id="brandList">
                        <option value="LG">
                        <option value="Samsung">
                        <option value="Daikin">
                        <option value="Voltas">
                        <option value="Blue Star">
                        <option value="Panasonic">
                       <option value="Hitachi">
                    </datalist>

                    <label for="service"></label>

                    <input
                    type="text"
                    id="service"
                    name="service"
                    list="serviceList"
                    placeholder="Select Service"
                    required>

                    <datalist id="serviceList">
                        <option value="Ac repair">
                        <option value="Installation">
                        <option value="Gas filling">
                        <option value="Deep cleaning">
                        <option value="AMC service">
                        <option value="Water leakage repair">
                        <option value="Cooling problem">
                    </datalist>


                    <input
                    type="date"
                    id="date"
                    required>

                    <input
                    type="time"
                    id="time">

                    <textarea
                    id="message"
                    rows="5"
                    placeholder="Additional Information"></textarea>

                    <button type="submit" class="btn">
                        Book Service
                    </button>

                </form>

            </div>

        </section>
    
    </main>
<!--========== FOOTER ==========-->

<footer>

<p class="copy">

© 2026 CoolFix AC Services

</p>

</footer>

<!--========== JAVASCRIPT ==========-->

<script>

const form = document.getElementById("bookingForm");

form.addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;

alert(
"Thank You " +
name +
"!\n\nYour booking has been received successfully.\nOur technician will contact you shortly."
);

form.reset();

});

</script>

</body>
</html>
